<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartHaul Notifications</title>
  <style>
    body { font-family: Arial, sans-serif; background: #07111f; color: #f8fafc; margin: 0; }
    .wrap { max-width: 840px; margin: 30px auto; padding: 24px; background: #111827; border-radius: 16px; }
    .item { background: #020617; padding: 12px; border-radius: 12px; margin: 10px 0; }
  </style>
</head>
<body>
  <div class="wrap">
    <h2>Notifications Center</h2>
    {% if notifications %}
      {% for item in notifications %}
        <div class="item">
          <strong>{{ item.title }}</strong>
          <div>{{ item.message }}</div>
        </div>
      {% endfor %}
    {% else %}
      <div class="item">No notifications yet.</div>
    {% endif %}
  </div>
</body>
</html>
