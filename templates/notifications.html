<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartHaul Notifications</title>
  <style>
    body { font-family: Arial, sans-serif; background: #07111f; color: #f8fafc; margin: 0; }
    .wrap { max-width: 840px; margin: 30px auto; padding: 24px; background: #111827; border-radius: 16px; }
    .item { background: #020617; padding: 12px; border-radius: 12px; margin: 10px 0; }
  </style>
</head>
<body>
  <div class="wrap">
    <h2>Notifications Center</h2>
    <div class="item">New booking request received from customer.</div>
    <div class="item">Vendor updated service availability.</div>
    <div class="item">Safety report escalated for review.</div>
  </div>
</body>
</html>
