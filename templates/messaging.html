<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartHaul Messaging</title>
  <style>
    body { font-family: Arial, sans-serif; background: #07111f; color: #f8fafc; margin: 0; }
    .wrap { max-width: 900px; margin: 30px auto; padding: 24px; background: #111827; border-radius: 16px; }
    .chat { border: 1px solid #334155; border-radius: 12px; padding: 12px; min-height: 260px; background: #020617; }
    .msg { margin: 8px 0; padding: 8px 10px; border-radius: 10px; background: #1d4ed8; display: inline-block; }
    .reply { background: #0f766e; }
    input { width: 100%; padding: 10px; margin-top: 10px; border-radius: 10px; border: 1px solid #334155; background: #020617; color: white; }
    button { margin-top: 8px; padding: 10px 14px; border: none; border-radius: 10px; background: #22c55e; color: white; cursor: pointer; }
  </style>
</head>
<body>
  <div class="wrap">
    <h2>Secure Messaging & Support Chat</h2>
    <div class="chat">
      <div class="msg">Hello, I need help with my booking.</div>
      <div class="msg reply">I can assist you. Please share your issue.</div>
    </div>
    <input placeholder="Type a message..." />
    <button>Send</button>
  </div>
</body>
</html>
