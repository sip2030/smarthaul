<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartHaul Analytics</title>
  <style>
    body { font-family: Arial, sans-serif; background: #07111f; color: #f8fafc; margin: 0; }
    .wrap { max-width: 1000px; margin: 30px auto; padding: 24px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
    .card { background: #111827; padding: 18px; border-radius: 16px; }
    .chart { height: 140px; border-radius: 12px; background: linear-gradient(90deg, #2563eb, #0f766e); margin-top: 12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h2>SmartHaul Analytics</h2>
    <div class="grid">
      <div class="card"><strong>Active Bookings</strong><br/>24</div>
      <div class="card"><strong>Revenue</strong><br/>$12,480</div>
      <div class="card"><strong>Growth</strong><br/>+18%</div>
      <div class="card"><strong>Resolution Time</strong><br/>8 min</div>
    </div>
    <div class="card" style="margin-top:16px;">
      <h3>Demand trend</h3>
      <div class="chart"></div>
    </div>
  </div>
</body>
</html>
