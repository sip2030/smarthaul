<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartHaul Analytics</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07111f;
      --panel: rgba(15, 23, 42, 0.94);
      --line: rgba(148, 163, 184, 0.18);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #2563eb;
      --accent-2: #0f766e;
      --good: #22c55e;
      --warn: #f59e0b;
    }
    body { margin: 0; font-family: "Segoe UI", sans-serif; background: radial-gradient(circle at top, #17304c 0, var(--bg) 58%); color: var(--text); }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 28px 20px 40px; }
    .hero { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 16px; align-items: stretch; }
    .panel, .card { background: var(--panel); border: 1px solid var(--line); border-radius: 20px; padding: 20px; box-shadow: 0 24px 80px rgba(2, 6, 23, 0.35); }
    .muted { color: var(--muted); }
    .summary { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; margin-top: 14px; }
    .metric { background: rgba(2, 6, 23, 0.65); border: 1px solid var(--line); border-radius: 16px; padding: 14px; }
    .metric strong { display: block; font-size: 1.5rem; margin-bottom: 6px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; margin-top: 16px; }
    .list { display: grid; gap: 10px; }
    .row { display: flex; justify-content: space-between; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--line); }
    .row:last-child { border-bottom: none; }
    .bars { display: grid; gap: 12px; margin-top: 10px; }
    .bar { background: rgba(2, 6, 23, 0.65); border-radius: 999px; overflow: hidden; border: 1px solid var(--line); }
    .bar > div { height: 12px; background: linear-gradient(90deg, var(--accent), var(--accent-2)); }
    .bar-label { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 6px; color: var(--muted); }
    button { border: none; border-radius: 12px; padding: 10px 14px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: white; cursor: pointer; }
    .split { display: flex; justify-content: space-between; gap: 12px; align-items: baseline; }
    .status { min-height: 24px; color: #bae6fd; }
    @media (max-width: 960px) {
      .hero { grid-template-columns: 1fr; }
      .summary { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 640px) {
      .summary { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="split" style="margin-bottom: 16px;">
      <div>
        <h1>SmartHaul Analytics</h1>
        <p class="muted">Aggregated performance, demand, and moderation metrics across the platform.</p>
      </div>
      <button id="refresh">Refresh</button>
    </div>

    <div id="status" class="status"></div>

    <section class="summary" id="summary"></section>

    <section class="hero" style="margin-top: 16px;">
      <div class="panel">
        <div class="split"><h2>Bookings by Status</h2><span class="muted">Operational demand</span></div>
        <div id="bookings-status" class="bars"></div>
      </div>
      <div class="panel">
        <div class="split"><h2>Route Source</h2><span class="muted">Routing readiness</span></div>
        <div id="route-source" class="metric" style="margin-top: 12px;"></div>
        <div id="payments-gateway" class="list" style="margin-top: 16px;"></div>
      </div>
    </section>

    <section class="grid">
      <div class="card">
        <div class="split"><h2>Vendor Onboarding</h2><span class="muted">Queue pressure</span></div>
        <div id="vendors-status" class="list"></div>
      </div>
      <div class="card">
        <div class="split"><h2>Support & Safety</h2><span class="muted">Call and moderation load</span></div>
        <h3 style="margin-bottom: 8px;">Call types</h3>
        <div id="calls-status" class="list"></div>
        <h3 style="margin: 16px 0 8px;">Moderation states</h3>
        <div id="moderation-status" class="list"></div>
      </div>
    </section>
  </div>

  <script>
    const statusEl = document.getElementById("status");
    const summaryEl = document.getElementById("summary");
    const bookingsStatusEl = document.getElementById("bookings-status");
    const vendorsStatusEl = document.getElementById("vendors-status");
    const callsStatusEl = document.getElementById("calls-status");
    const moderationStatusEl = document.getElementById("moderation-status");
    const routeSourceEl = document.getElementById("route-source");
    const paymentsGatewayEl = document.getElementById("payments-gateway");

    function renderMetric(title, value, note = "") {
      return `<div class="metric"><strong>${value}</strong><div>${title}</div>${note ? `<div class="muted">${note}</div>` : ""}</div>`;
    }

    function renderBars(container, items, keyName) {
      if (!items.length) {
        container.innerHTML = '<div class="muted">No data yet.</div>';
        return;
      }
      const maxCount = Math.max(...items.map((item) => item.count || 0), 1);
      container.innerHTML = items.map((item) => `
        <div>
          <div class="bar-label"><span>${item[keyName]}</span><span>${item.count}</span></div>
          <div class="bar"><div style="width:${Math.max((item.count / maxCount) * 100, 8)}%"></div></div>
        </div>
      `).join("");
    }

    function renderList(container, entries, keyName) {
      if (!entries.length) {
        container.innerHTML = '<div class="muted">No data yet.</div>';
        return;
      }
      container.innerHTML = entries.map((item) => `<div class="row"><span>${item[keyName]}</span><strong>${item.count}</strong></div>`).join("");
    }

    async function loadAnalytics() {
      const response = await fetch("/analytics/overview");
      const data = await response.json();
      if (!response.ok) {
        statusEl.textContent = data.detail || "Unable to load analytics.";
        return;
      }
      statusEl.textContent = `Analytics refreshed. Route source: ${data.route_source}.`;
      summaryEl.innerHTML = [
        renderMetric("Bookings", data.summary.bookings_total, `${data.summary.active_bookings} active`),
        renderMetric("Revenue", data.summary.revenue, `${data.summary.payments_total} payments`),
        renderMetric("Vendors", data.summary.vendors_total, `${data.summary.pending_vendor_reviews} pending reviews`),
        renderMetric("Safety", data.summary.open_moderation_cases, `${data.summary.call_sessions_total} call sessions`),
      ].join("");
      renderBars(bookingsStatusEl, data.bookings_by_status, "status");
      renderList(vendorsStatusEl, data.vendors_by_status, "status");
      renderList(callsStatusEl, data.calls_by_type, "call_type");
      renderList(moderationStatusEl, data.moderation_by_status, "status");
      routeSourceEl.textContent = `Current route source: ${data.route_source}.`;
      paymentsGatewayEl.innerHTML = data.payments_by_gateway.length
        ? data.payments_by_gateway.map((item) => `<div class="row"><span>${item.gateway}</span><strong>${item.count}</strong></div>`).join("")
        : '<div class="muted">No payment gateways recorded yet.</div>';
    }

    document.getElementById("refresh").addEventListener("click", loadAnalytics);
    loadAnalytics();
  </script>
</body>
</html>
