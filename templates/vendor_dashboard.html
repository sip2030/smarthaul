<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartHaul Vendor Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; background: #07111f; color: #f8fafc; margin: 0; }
    .wrap { max-width: 1100px; margin: 30px auto; padding: 24px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; }
    .card { background: #111827; padding: 18px; border-radius: 16px; margin-bottom: 16px; }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    th, td { padding: 10px; border-bottom: 1px solid #334155; text-align: left; }
  </style>
</head>
<body>
  <div class="wrap">
    <h2>Vendor Dashboard</h2>
    <p>Track listings, orders, and fulfillment from a single workspace.</p>
    <div class="grid">
      <div class="card">
        <h3>Listings</h3>
        <ul>
          <li>Urban Logistics Hub</li>
          <li>Express Haul Services</li>
        </ul>
      </div>
      <div class="card">
        <h3>Orders</h3>
        <table>
          <tr><th>Order</th><th>Status</th><th>Value</th></tr>
          <tr><td>#1001</td><td>In fulfillment</td><td>$180</td></tr>
          <tr><td>#1002</td><td>Awaiting pickup</td><td>$240</td></tr>
        </table>
      </div>
    </div>
  </div>
</body>
</html>
