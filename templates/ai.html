<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartHaul AI Assistant</title>
  <style>
    body { font-family: Arial, sans-serif; background: #07111f; color: #f8fafc; margin: 0; }
    .wrap { max-width: 760px; margin: 40px auto; padding: 24px; background: #111827; border-radius: 16px; }
    .bubble { background: #1d4ed8; padding: 10px 12px; border-radius: 10px; margin: 10px 0; }
    input { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #334155; background: #020617; color: white; }
    button { margin-top: 8px; padding: 10px 14px; border: none; border-radius: 10px; background: #22c55e; color: white; cursor: pointer; }
  </style>
</head>
<body>
  <div class="wrap">
    <h2>SmartHaul AI Assistant</h2>
    <div class="bubble">Hello! I can help you book a ride, find a vendor, report a problem, or guide you through the app.</div>
    <form action="/ai/support" method="post">
      <input name="message" placeholder="Ask SmartHaul something..." required />
      <button type="submit">Send</button>
    </form>
  </div>
</body>
</html>
