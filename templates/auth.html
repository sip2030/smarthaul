<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartHaul Auth</title>
  <style>
    body { font-family: Arial, sans-serif; background: #07111f; color: #f8fafc; margin: 0; }
    .wrap { max-width: 420px; margin: 80px auto; background: #111827; padding: 24px; border-radius: 16px; }
    input, select { width: 100%; padding: 10px; margin: 8px 0 12px; border-radius: 10px; border: 1px solid #334155; background: #020617; color: white; }
    button { width: 100%; padding: 10px; border: none; border-radius: 10px; background: #2563eb; color: white; cursor: pointer; }
    .note { font-size: 0.95rem; color: #94a3b8; }
  </style>
</head>
<body>
  <div class="wrap">
    <h2>SmartHaul Access</h2>
    <p class="note">Register as a customer, provider, vendor, or admin.</p>
    <form action="/auth/register" method="post">
      <input name="name" placeholder="Full name" required />
      <input name="email" type="email" placeholder="Email" required />
      <select name="role">
        <option value="customer">Customer</option>
        <option value="provider">Provider</option>
        <option value="vendor">Vendor</option>
        <option value="admin">Admin</option>
      </select>
      <input name="password" type="password" placeholder="Password" required />
      <button type="submit">Create account</button>
    </form>
    <hr />
    <form action="/auth/login" method="post">
      <input name="email" type="email" placeholder="Email" required />
      <input name="password" type="password" placeholder="Password" required />
      <button type="submit">Sign in</button>
    </form>
  </div>
</body>
</html>
