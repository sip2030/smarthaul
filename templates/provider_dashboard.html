<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartHaul Provider Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; background: #07111f; color: #f8fafc; margin: 0; }
    .wrap { max-width: 1100px; margin: 30px auto; padding: 24px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; }
    .card { background: #111827; padding: 18px; border-radius: 16px; margin-bottom: 16px; }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    th, td { padding: 10px; border-bottom: 1px solid #334155; text-align: left; }
    .pill { display: inline-block; padding: 5px 10px; border-radius: 999px; background: #1d4ed8; font-size: 12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h2>Provider Dashboard</h2>
    <p>Manage bookings, accept requests, and keep your service area updated.</p>
    <div class="grid">
      <div class="card">
        <h3>Active requests</h3>
        <div class="pill">3 pending</div>
        <table>
          <tr><th>Customer</th><th>Service</th><th>Status</th></tr>
          <tr><td>Ada</td><td>Ride</td><td>Pending</td></tr>
          <tr><td>Grace</td><td>Haulage</td><td>Accepted</td></tr>
        </table>
      </div>
      <div class="card">
        <h3>Performance</h3>
        <ul>
          <li>Completion rate: 94%</li>
          <li>Avg. response time: 6 mins</li>
          <li>Earnings: $4,820 this month</li>
        </ul>
      </div>
    </div>
  </div>
</body>
</html>
