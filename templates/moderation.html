<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartHaul Moderation</title>
  <style>
    body { font-family: Arial, sans-serif; background: #07111f; color: #f8fafc; margin: 0; }
    .wrap { max-width: 860px; margin: 30px auto; padding: 24px; background: #111827; border-radius: 16px; }
    .card { background: #020617; padding: 14px; border-radius: 12px; margin: 12px 0; }
    button { padding: 8px 12px; border: none; border-radius: 10px; background: #f59e0b; color: black; cursor: pointer; margin-right: 8px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h2>Moderation & Dispute Review</h2>
    <div class="card">
      <strong>Report #102</strong>
      <p>Customer reports abusive language from provider.</p>
      <button>Review</button><button>Resolve</button>
    </div>
    <div class="card">
      <strong>Report #103</strong>
      <p>Provider reports false booking cancellation.</p>
      <button>Review</button><button>Escalate</button>
    </div>
  </div>
</body>
</html>
