<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartHaul Calls</title>
  <style>
    body { font-family: Arial, sans-serif; background: #07111f; color: #f8fafc; margin: 0; }
    .wrap { max-width: 860px; margin: 30px auto; padding: 24px; background: #111827; border-radius: 16px; }
    .panel { background: #020617; padding: 16px; border-radius: 12px; margin-top: 14px; }
    button { padding: 10px 14px; border: none; border-radius: 10px; cursor: pointer; margin-right: 8px; }
    .start { background: #22c55e; color: white; }
    .end { background: #dc2626; color: white; }
  </style>
</head>
<body>
  <div class="wrap">
    <h2>Audio & Video Support</h2>
    <p>Secure call support for disputes, verification, and customer assistance.</p>
    <div class="panel">
      <strong>Active session</strong>
      <p>Support agent connected with customer.</p>
      <button class="start">Start call</button>
      <button class="end">End call</button>
    </div>
  </div>
</body>
</html>
