name: SmartHaul CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: '3.11'

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: smarthaul_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: django_smarthaul/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r django_smarthaul/requirements.txt
          pip install pytest pytest-django pytest-cov

      - name: Run migrations
        env:
          DJANGO_SETTINGS_MODULE: config.settings
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/smarthaul_test
          SECRET_KEY: ci-test-secret-key
          DEBUG: "false"
        working-directory: django_smarthaul
        run: python manage.py migrate --noinput

      - name: Run tests
        env:
          DJANGO_SETTINGS_MODULE: config.settings
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/smarthaul_test
          SECRET_KEY: ci-test-secret-key
          DEBUG: "false"
          APP_BASE_URL: http://localhost:8001
        run: |
          pytest django_smarthaul tests -v --cov=django_smarthaul --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: pip install bandit safety

      - name: Run Bandit
        run: bandit -r django_smarthaul -f json -o bandit-report.json --exclude django_smarthaul/apps/*/migrations || true

      - name: Check dependencies
        run: safety check --file django_smarthaul/requirements.txt --json || true

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Render
        run: |
          curl -X POST "https://api.render.com/deploy/srv-${{ secrets.RENDER_SERVICE_ID_PROD }}" \
            -H "accept: application/json" \
            -H "authorization: Bearer ${{ secrets.RENDER_API_KEY }}"

      - name: Health check
        run: |
          sleep 60
          curl -f https://smarthaul-059r.onrender.com/api/auth/health/ || exit 1

      - name: Notify success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            if (context.issue && context.issue.number) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '✅ Production deployment successful!'
              })
            }

      - name: Notify failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            if (context.issue && context.issue.number) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '❌ Production deployment failed. Check the Actions log.'
              })
            }
