services:
  - type: web
    name: smarthaul
    env: python
    plan: free
    buildCommand: pip install -r django_smarthaul/requirements.txt && python django_smarthaul/manage.py collectstatic --noinput
    startCommand: gunicorn --chdir django_smarthaul config.wsgi:application --bind 0.0.0.0:$PORT --workers 4 --timeout 120
    autoDeploy: true
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: 127.0.0.1,localhost,.onrender.com,smarthaul-059r.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        value: postgresql://smarthaul_db_wim9_user:wkmOn7vVqtS9k6AbaDRxVNSI47pSAKKX@dpg-d9973h9o3t8c73f003v0-a/smarthaul_db_wim9?connect_timeout=10
      - key: DATABASE_PATH
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: PAYMENT_PROVIDER
        value: flutterwave
      - key: FLUTTERWAVE_SECRET_KEY
        sync: false
      - key: FLUTTERWAVE_WEBHOOK_SECRET_HASH
        sync: false
      - key: ROUTING_PROVIDER
        value: openrouteservice
      - key: OPENROUTESERVICE_API_KEY
        sync: false
      - key: SESSION_ENGINE
        value: django.contrib.sessions.backends.db
      - key: SESSION_COOKIE_SECURE
        value: true
      - key: SESSION_COOKIE_SAMESITE
        value: Lax
      - key: CSRF_COOKIE_SAMESITE
        value: Lax
      - key: SECURE_SSL_REDIRECT
        value: true
      - key: SECURE_HSTS_SECONDS
        value: 2592000
