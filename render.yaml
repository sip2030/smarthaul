services:
  - type: web
    name: smarthaul
    env: python
    plan: free
    buildCommand: pip install -r requirements-free.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_PATH
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: FLUTTERWAVE_SECRET_KEY
        sync: false
      - key: FLUTTERWAVE_WEBHOOK_SECRET_HASH
        sync: false
      - key: ROUTING_PROVIDER
        value: simulated
      - key: OPENROUTESERVICE_API_KEY
        sync: false
