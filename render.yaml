services:
  - type: web
    name: smarthaul
    env: python
    plan: free
    buildCommand: pip install -r django_smarthaul/requirements.txt && python django_smarthaul/manage.py collectstatic --noinput && python django_smarthaul/manage.py migrate --noinput
    startCommand: gunicorn --chdir django_smarthaul config.wsgi:application --bind 0.0.0.0:$PORT --workers 4 --timeout 120
    autoDeploy: true
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_PATH
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: FLUTTERWAVE_SECRET_KEY
        sync: false
      - key: FLUTTERWAVE_WEBHOOK_SECRET_HASH
        sync: false
      - key: ROUTING_PROVIDER
        value: simulated
      - key: OPENROUTESERVICE_API_KEY
        sync: false
